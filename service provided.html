<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup Images</title>

<style>
  /* Reset basic styles */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: Arial, sans-serif;
    background-color: white;
    color: white;
    overflow-x: hidden;
  }

  /* Fixed header */
  header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 70px;
    background: linear-gradient(to right, darkblue, rgb(255, 166, 0));
    display: flex;
    align-items: center;
    padding: 0 20px;
    z-index: 1000;
    border-bottom: 3px solid yellow;
  }

  header img {
    height: 50px;
  }

  /* Scrollable main content */
  main {
    margin-top: 80px;
    margin-bottom: 100px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
    justify-items: center;
    gap: 30px;
    padding: 20px;
  }

  /* Ripple image container */
  .ripple-image {
    position: relative;
    overflow: hidden;
    border: 4px solid yellow;
    border-radius: 10px;
    width: 400px;
    height: 500px;
  }

  .ripple-image img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    transition: transform 0.4s ease;
  }

  /* Ripple hover effect */
  .ripple-image::after {
    content: "";
    position: absolute;
    left: 50%;
    top: 50%;
    width: 0;
    height: 0;
    background: gray;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    opacity: 0;
    transition: width 0.6s ease, height 0.6s ease, opacity 0.8s ease;
  }

  .ripple-image:hover::after {
    width: 300px;
    height: 300px;
    opacity: 0;
  }

  .ripple-image:hover img {
    transform: scale(1.05);
  }

  /* Fixed footer */
  footer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background-color: darkblue;
    text-align: center;
    padding: 15px;
    border-top: 3px solid yellow;
    z-index: 1000;
  }

  footer button {
    background-color: yellow;
    color: black;
    border: 4px solid black;
    padding: 10px 20px;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: background-color 0.3s ease;
  }

  footer button:hover {
    background-color: purple;
    color: white;
  }
</style>
</head>

<body>

  <!-- Header -->
  <header>
    <img src="TG business/TG logo design 1.png" alt="Logo">
  </header>

  <!-- Main content -->
  <main>
    <div class="ripple-image">
      <img src="TG business/tg mockup.png" alt="lanyard mockup">
    </div>

    <div class="ripple-image">
      <img src="TG business/caleb Singumani.jpg" alt="TG invoice">
    </div>

    <div class="ripple-image">
      <img src="TG business/Post couria.jpg" alt="Lady's office wear">
    </div>

    <!-- All remaining images centered -->
    <div class="ripple-image">
      <img src="TG business/wnb mockup.jpg" alt="umbrella mockup 1">
    </div>

    <div class="ripple-image">
      <img src="TG business/Arob shirt.jpg" alt="cup mockup 1">
    </div>

    <div class="ripple-image">
      <img src="TG business/TG LOGO 8.png" alt="car mockup 1">
    </div>

  <!-- Footer -->
  <footer>
    <button onclick="window.location.href='50th anniversary.html'">Back to Home</button>
  </footer>

</body>
</html>
