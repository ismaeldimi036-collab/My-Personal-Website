<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image with Footer Button</title>
<style>
  body {
    background-color: black;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 0;
  }

  img {
    border: 4px solid yellow;
    width: 500px;
    height: 500px;
    margin-top: 10px;
    border-radius: 8px;
  }

  footer {
    margin-top: 40px;
    padding: 20px;
  }

  button {
    background-color: yellow;
    color: black;
    border: 4px solid black;
    padding: 30px 80px;
    font-size: 28px;
    border-radius: 6px;
    cursor: pointer;
    transition: background-color 0.3s ease;
  }

  button:hover {
    background-color: purple;
    color: white;
  }
</style>
</head>
<body>

  <h2>Lewana Logo image</h2>
  <img src="TG business\Lewana Logo.jpg" alt="Sample Image">

  <footer>
    <a href="imageMap.html" target="_blank">
    <button>Back To Image Map</button>
    </a>
    </footer>

</body>
</html>
