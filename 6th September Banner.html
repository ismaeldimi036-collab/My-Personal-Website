<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image with Footer Button</title>
<style>
  body {
    background-color: black;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 0;
  }

  img {
    border: 4px solid yellow;
    width: 1330px;
    height: 500px;
    margin-top: 10px;
    border-radius: 8px;
  }

  /* Fixed footer */
  footer {
    position:relative;
    bottom: 0;
    left: 0;
    width: 100%;
    background-color: darkblue;
    text-align: center;
    padding: 15px;
    border-top: 3px solid yellow;
    z-index: 1000;
  }

  footer button {
    background-color: yellow;
    color: black;
    border: 4px solid black;
    padding: 10px 20px;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: background-color 0.3s ease;
  }

  footer button:hover {
    background-color: purple;
    color: white;
  }


</style>
</head>
<body>
