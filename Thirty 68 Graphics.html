<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thirty 6-8</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: Arial, sans-serif;
    background-color: white;
    margin: 0;
  }

  /* Header */
  header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: linear-gradient(to right, darkblue, rgb(255, 166, 0));
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    z-index: 1000;
  }

  header .logo {
    font-weight: bold;
    font-size: 20px;
  }

  header .nav {
    font-size: 18px;
  }

  /* Main Content */
  main {
    margin-top: 80px;
    margin-bottom: 100px;
    padding: 20px;
  }

  .image-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
    margin-bottom: 40px;
  }

  .image-box {
    background-color: #ccc;
    height: 150px;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
    transition: transform 0.3s ease;
  }

  .image-box:hover {
    transform: scale(1.05);
  }

  /* Ripple animation */
  .image-box::after {
    content: "";
    position: absolute;
    width: 0;
    height: 0;
    background: rgba(255, 255, 255, 0.5);
    border-radius: 50%;
    transform: scale(0);
    opacity: 0;
    transition: transform 0.6s, opacity 1s;
  }

  .image-box:active::after {
    width: 100px;
    height: 100px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(3);
    opacity: 0;
  }

  /* Boxes at bottom */
  .bottom-boxes {
    display: flex;
    justify-content: center;
    gap: 20px;
  }

  .bottom-box {
    background-color: #bbb;
    padding: 50px 0;
    width: 30%;
    text-align: center;
    font-weight: bold;
    border-radius: 10px;
  }

  /* Footer */
  footer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background-color: #555;
    color: white;
    text-align: center;
    padding: 15px;
  }

  footer button {
    background-color: yellow;
    border: 4px solid black;
    color: black;
    padding: 10px 25px;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
  }

  footer button:hover {
    background-color: purple;
    color: white;
  }

  a {
    text-decoration: none;
  }

</style>
</head>
<body>

  <header>
    <div class="logo">Logo</div>
    <div class="nav">Navigation</div>
  </header>

  <main>
    <div class="image-grid">
      <div class="image-box"></div>
      <div class="image-box"></div>
      <div class="image-box"></div>
      <div class="image-box"></div>
      <div class="image-box"></div>
      <div class="image-box"></div>
      <div class="image-box"></div>
      <div class="image-box"></div>
      <div class="image-box"></div>
      <div class="image-box"></div>
      <div class="image-box"></div>
      <div class="image-box"></div>
    </div>

    <div class="bottom-boxes">
      <div class="bottom-box">Box 1</div>
      <div class="bottom-box">Box 2</div>
      <div class="bottom-box">Box 3</div>
    </div>
  </main>

  <footer>
    <a href="home.html">
      <button>Go Back to Home</button>
    </a>
  </footer>

</body>
</html>
