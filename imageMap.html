<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Maps</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: darkblue;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h2 {
      color: white;
      font-size:x-large;
    }

    p {
      color: white;
      font-size: 28px;
    }

      /* HEADER */
  header {
    background-color: darkblue;
    padding: 20px 0;
  }

  /* FOOTER */
  footer {
    background-color: orange;
    text-align: center;
    padding: 90px 0px;
    position:relative;
    bottom: 0;
    width: 100%;
  }

    /* BUTTON */
  .home-btn {
    background-color: darkblue;
    color: white;
    border: none;
    border-radius: 20px;
    padding: 70px 100px;
    font-size: 70px;
    cursor: pointer;
    transition: 0.3s;
  }

  .home-btn:hover {
    background-color: purple;
  }

    /* Image responsive and centered */
    img {
      display: block;
      margin: 20px auto;
      max-width: 90%;
      height: auto;
      border: 3px yellow; 
      border-radius: 8px;
    }
  </style>
</head>
